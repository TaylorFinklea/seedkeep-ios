name: Seedkeep
options:
  deploymentTarget:
    # iOS 18.1 floor lets us link FoundationModels (iOS 26+ at runtime,
    # availability-gated) without dropping pre-26 devices entirely. Older
    # devices fall through to manual entry or the Hosted (server) tier.
    iOS: "18.1"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "13"
    # DEVELOPMENT_TEAM intentionally not pinned here — flows in from
    # Seedkeep/Config/AppConfig.example.xcconfig (or AppConfig.local).
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

configs:
  Debug: debug
  Release: release

packages:
  SeedkeepKit:
    path: SeedkeepKit

targets:
  Seedkeep:
    type: application
    platform: iOS
    sources:
      - path: Seedkeep
        excludes:
          - "Config/AppConfig.local.xcconfig"
    resources:
      - Seedkeep/Resources
    info:
      path: Seedkeep/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Seedkeep
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: "Seedkeep needs the camera to scan seed-packet barcodes and capture front/back photos for AI catalog extraction."
        NSPhotoLibraryUsageDescription: "Seedkeep can attach photos from your library to seed entries."
        # iPhone is portrait-locked (the UI is designed around the single-
        # hand thumb reach). iPad needs all four orientations declared
        # because Stage Manager / Split View resize apps to arbitrary
        # frames — Apple's validator rejects iPad-capable binaries that
        # don't support all four.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Declares that the app's use of encryption is exempt under the
        # standard HTTPS/URLSession provisions. Stops TestFlight from
        # asking on every build. Flip to true (and file an annual
        # self-classification report) only if we add custom cryptography
        # beyond the OS-provided TLS path.
        ITSAppUsesNonExemptEncryption: false
        # Surfaced from xcconfig — `AppEnvironment` reads these at launch.
        SeedkeepAPIScheme: "$(SEEDKEEP_API_SCHEME)"
        SeedkeepAPIHost: "$(SEEDKEEP_API_HOST)"
        KeychainService: "$(KEYCHAIN_SERVICE)"
        # Custom URL scheme for development invite links
        # (`seedkeep://invite/<code>`). Universal links use the
        # `applinks:seedkeep.app` entitlement.
        CFBundleURLTypes:
          - CFBundleURLName: app.seedkeep.invite
            CFBundleURLSchemes:
              - seedkeep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER)
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: SeedkeepKit
    configFiles:
      Debug: Seedkeep/Config/AppConfig.example.xcconfig
      Release: Seedkeep/Config/AppConfig.example.xcconfig
    entitlements:
      path: Seedkeep/Seedkeep.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.associated-domains:
          - "applinks:seedkeep.app"

  SeedkeepTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SeedkeepTests
    dependencies:
      - target: Seedkeep
      - package: SeedkeepKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER).tests
